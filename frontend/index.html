<!DOCTYPE html>

    <!-- ── Limpa SW e cache em todas as origens (Cache-Busting for CSP) ── -->
    <script>
      (function () {
        try {
          var manifestLink = document.querySelector('link[rel="manifest"]');
          if (manifestLink) manifestLink.remove();
        } catch (_) {}
        if (!('serviceWorker' in navigator)) return;
        var cleanupFlag = 'mc-sw-cleanup-v3';
        if (sessionStorage.getItem(cleanupFlag) === 'done') return;
        sessionStorage.setItem(cleanupFlag, 'pending');
        Promise.all([
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            return Promise.all(registrations.map(function (r) { return r.unregister(); }));
          }),
          ('caches' in window)
            ? caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (key) { return caches.delete(key); }));
              })
            : Promise.resolve(),
        ]).finally(function () {
          sessionStorage.setItem(cleanupFlag, 'done');
          location.replace(location.pathname + location.search + location.hash);
        });
      })();
    </script>

    <!-- ── Viewport ── -->
